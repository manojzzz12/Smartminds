services:
  mongo:
    image: mongo:8
    container_name: sourcemind-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sourcemind-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5001
      CLIENT_URL: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/sourcemind
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-gemini-2.5-flash-lite}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
    ports:
      - "5001:5001"
    volumes:
      - uploads-data:/app/uploads

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: sourcemind-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo-data:
  uploads-data:
